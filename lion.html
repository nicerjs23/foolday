<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 카카오톡 링크 미리보기용 OG 태그 (낚시 내용) -->
    <meta
      property="og:title"
      content="💸 친구가 나에게 1,000,000원을 보냈어요!"
    />
    <meta
      property="og:description"
      content="카카오페이 머니가 도착했습니다. 지금 바로 확인하세요."
    />
    <meta
      property="og:image"
      content="https://t1.kakaocdn.net/kakaopay/static/images/kakaopay_og.png"
    />

    <title>카카오페이 머니 도착</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="gotcha-page">
    <!-- 가짜 로딩 화면 -->
    <div id="fake-loading" class="fake-loading">
      <div class="loading-spinner"></div>
      <p>과제 패스권 생성하는 중...</p>
    </div>

    <!-- 낚시 reveal 카드 -->
    <div id="reveal" class="reveal-container hidden">
      <div class="gotcha-card">
        <img
          src="skrr.webp"
          alt="skrr"
          style="width: 100%; border-radius: 12px"
        />

        <h1>만우절이지롱~</h1>
        <p class="gotcha-message">
          과제 패스권은 사실 없습니다..<br />
          다들 세션 파이팅 🔥 <br />- 멋사 대장 강근우 -
        </p>
      </div>
    </div>

    <!-- 콘페티 캔버스 -->
    <canvas id="confettiCanvas"></canvas>

    <script src="script.js"></script>
  </body>
</html>
